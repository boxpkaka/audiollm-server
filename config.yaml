# =============================================================================
# AudioLLM Server 配置(声明式单一真源)
#
# 本文件是运行参数的唯一入口, 取代旧的 backend/config.json 与 backend/api.json。
# 密钥不写明文: 用 ${ENV_VAR} 引用环境变量(见 .env.example), 未设置则插值为空串。
# 可用 CONFIG_PATH 环境变量指向其他配置文件。
# =============================================================================

# 共享 httpx 连接池上限(所有 vLLM / 上游 HTTP 调用复用同一个连接池)。
http_pool:
  max_connections: 32
  max_keepalive_connections: 16

# 下游服务实例池。
#   base_url 一律为"服务根"(不含 /v1), 调用层统一拼 /v1/chat/completions。
#   timeout  = 该后端单次 HTTP 请求超时(秒)。
#   api_key  非空即以 Authorization: Bearer 发送; 留空则不加鉴权头。
upstreams:
  amphion_asr:
    base_url: http://localhost:8009
    model_name: AmphionASR-1.7B
    # Prompt template follows the served checkpoint:
    #   AmphionASR-4.3B -> amphion_asr
    #   AmphionASR-1.7B -> amphion_asr_1.7b
    prompt_template: amphion_asr_1.7b
    timeout: 120
  qwen_asr:
    base_url: http://localhost:8001
    model_name: Qwen/Qwen3-ASR-1.7B
    timeout: 120
  amphion_emotion:
    base_url: http://localhost:8222
    model_name: AmphionSE
    timeout: 30
  amphion_spec:
    base_url: http://localhost:9001
    model_name: AmphionSPEC
    timeout: 30
  dashscope_cleanup:
    base_url: https://dashscope.aliyuncs.com/compatible-mode
    model_name: qwen2.5-32b-instruct
    api_key: ${DASHSCOPE_API_KEY}
    timeout: 30
    max_tokens: 1024
  hotword_llm:                 # 取代旧 backend/api.json(热词抽取 LLM)
    base_url: ${HOTWORD_BASE_URL}
    model_name: ${HOTWORD_MODEL}
    api_key: ${HOTWORD_API_KEY}
    timeout: 30
  triton_recall:
    base_url: http://localhost:10001
    model_name: rag_asr_retrieve
    timeout: 30
  rag_asr_management:
    # Optional RAG-ASR HTTP management service. Keep empty to preserve the
    # legacy Triton-management/local-enrollment path. When enabling gray
    # enrollment embedding store, point this to RAG-ASR serve_http.sh, for
    # example http://127.0.0.1:18080.
    base_url: ${RAG_ASR_MANAGEMENT_BASE_URL}
    model_name: rag_asr_management
    timeout: 30

# 全局默认 tuning; 端点的 policy 可逐项软覆盖, lock 可硬锁定。
# 注: base_url/model/timeout 属 upstreams, 不在此; 这里只放纯调参。
defaults:
  vad:
    vad_threshold: 0.65
    silence_duration_ms: 1000
    vad_smoothing_alpha: 0.3
    vad_start_frames: 20
    vad_pre_speech_ms: 500
    vad_keep_tail_ms: 40
    min_segment_duration_ms: 350
  pseudo_stream:
    enable_pseudo_stream: true
    pseudo_stream_interval_ms: 800
    pseudo_stream_first_partial_ms: 200   # 不变量: <= min_segment_duration_ms
  k2:
    k2_enabled: true
    k2_target: localhost:50051
    k2_sample_rate: 16000
    k2_include_token_timestamps: false    # k2 只做纯识别:不取 token timestamps
    k2_connect_timeout_sec: 5.0
    k2_fallback_to_local: true
    k2_max_segment_sec: 30.0              # k2 长时间不出 endpoint 时本地强切兜底，防止缓冲无限增长
    k2_idle_keep_ms: 1500                 # 未见 k2 起音前，本地缓冲只保留最近窗口
    k2_voice_gate_enabled: true           # k2 partial/endpoint 放行前需本地确认有人声证据
    k2_voice_gate_threshold: 0.65         # 只做 accept/drop，不用本地 VAD 裁剪 k2 段边界
    k2_voice_gate_start_frames: 10        # 约 160ms 连续人声证据，抑制环境音误触发并降低首字额外门控延迟
  asr:
    enable_primary_asr: true
    enable_secondary_asr: true            # 端点未绑 secondary 上游时, 投影强制 false
    enable_dual_asr_fusion: false         # final 是否双模型融合(需 secondary 在线)
    primary_asr_timeout: 4.0              # primary 软降级上限(非 HTTP 超时)
    debug_show_dual_asr: false            # 出站附带双 ASR 调试字段(当前主前端不展示)
  fusion:
    fusion_similarity_threshold: 0.85
    fusion_min_primary_score: 0.55
    fusion_max_repetition_ratio: 0.35
    fusion_disagreement_threshold: 0.55
    fusion_hotword_boost: 0.12
    fusion_primary_score_margin: 0.08
  recall:
    enable_hotword_recall: true
    recall_top_k: 50
    hotword_pool_id: default                 # 未显式传 hotword_pool_id/user_id 时使用的热词池 ID
    recall_user_id: default                  # 兼容旧配置键；语义同 hotword_pool_id
    recall_custom_hotword_limit: 8           # 每次请求最多追加多少个临时 hotwords 到 prompt；不写入热词池
    enable_encoder_bypass: true
  itn:
    enable_asr_itn: true
    asr_itn_enable_0_to_9: false
    enable_asr_plate_normalize: true
    enable_asr_repetition_fix: true
  enrollment:
    asr_enrollment_min_sec: 1.0
    asr_enrollment_max_sec: 8.0
    asr_enrollment_ttl_sec: 3600
    asr_enrollment_max_entries: 256       # 进程级 store 容量(非 per-endpoint)
    enable_triton_enrollment_store: false # 关闭时保持本地注册音频缓存；灰度打开后转发管理服务保存 embedding tensor
    enable_enrollment_embedding_bypass: true
  transcribe:                             # 离线长音频转写 job (POST /api/asr/transcriptions)
                                          # 本组只放纯调参; 用哪个模型/是否融合在下方 rest.routes.transcribe
                                          # 调参依据: docs/transcription-jobs-benchmark.md(H20 实测扫参)
    transcribe_max_concurrent_jobs: 2     # 同时 running 的 job 数; 提到 4 吞吐不变(瓶颈在段级
                                          # 并发), 只多占内存且拖慢先到任务
    transcribe_segment_concurrency: 4     # 单 job 内并行推理的段数(总 vLLM 压力 = 两者乘积);
                                          # 提到 8 单 job 仅 -3.6s, 但峰值压力翻倍挤压实时流量
    transcribe_job_queue_max: 8           # 排队上限(含 running); 8 个 32min 会议实测 41.5s 清空
    transcribe_job_ttl_sec: 3600          # 终态 job 结果保留时长
    transcribe_max_segment_sec: 30.0      # 连续语音强切上限(VAD 只在静音处切); 15/30 性能无差异
    transcribe_max_upload_bytes: 536870912  # 512MB; 2h 16k mono WAV ≈ 220MB
    transcribe_max_audio_sec: 10800       # 超长直接 400 拒绝(不尾截, 不静默丢内容)
    transcribe_silence_duration_ms: 800   # 仅离线转写的切段停顿; 0 = 跟随全局
                                          # silence_duration_ms(350, 为实时调的低延迟值)。
                                          # 离线无延迟代价, 拉长可让纪要段落更完整且更快
                                          # (实测 350ms: 636 段 p50 1.5s; 800ms: 303 段
                                          #  p50 3.2s, e2e 还快 11%)
  emotion:
    emotion_task_mode: ser
    emotion_max_audio_seconds: 20.0
    emotion_max_concurrent_jobs: 8        # 进程级 job 背压
    emotion_job_queue_max: 64
    emotion_job_ttl_sec: 3600
  emotion_spec:
    emotion_spec_task_mode: sepc
    emotion_spec_max_audio_seconds: 20.0
    emotion_spec_max_concurrent_jobs: 8
    emotion_spec_job_queue_max: 64
    emotion_spec_job_ttl_sec: 3600
  debug:                                  # 排查用: 落盘每个 final 段的音频+元信息
    debug_dump_enabled: false             # 生产环境请置 false(磁盘无限增长); 仅 native /transcribe-streaming 暴露 dump_id
    debug_dump_dir: debug_dumps           # 相对路径相对项目根; 也可填绝对路径

# 全局单例辅助服务: 不随端点变化, 所有端点/REST 共享(工具型外部服务)。
services:
  hotword: hotword_llm
  recall: triton_recall
  recall_management: rag_asr_management
  text_cleanup: dashscope_cleanup

# REST/HTTP 路由的上游绑定: upstreams 是所有 REST 接口的共享默认,
# routes.<name> 是单接口覆写(省略 = 全部跟随共享默认与 defaults 全局开关)。
rest:
  upstreams:                     # 共享绑定(/api/asr/upload、/api/audio/analyze、情感 jobs)
    primary: amphion_asr
    secondary: qwen_asr
    emotion: amphion_emotion
    emotion_spec: amphion_spec
  routes:
    transcribe:                  # 长音频离线转写 (POST /api/asr/transcriptions) 专属推理配置
      upstreams:
        primary: amphion_asr     # 转写主模型(换模型改这里, 不影响 upload/analyze)
        secondary: qwen_asr      # 仅 enable_dual_asr_fusion=true 时参与
      enable_dual_asr_fusion: false  # 转写是否双模型融合。离线无延迟压力, 质量优先可改 true
                                     # (每段 2 个 vLLM 请求, 吞吐约减半, 见 benchmark 文档)

# WS 端点: 每个端点自主声明 协议/任务/上游绑定/策略(不从全局隐式继承)。
#   protocol: native | astv3
#   task:     asr | emotion
#   upstreams: 角色 -> upstream 名 (primary/secondary/emotion/emotion_spec)
#   policy:   软默认(client_overridable 端点的白名单字段可再覆盖)
#   lock:     硬锁定(客户端覆盖后强制重施)
# 注: 阶段三才接入动态注册; 当前 backend/main.py 仍静态注册这些路由。
endpoints:
  - path: /transcribe-streaming
    protocol: native
    task: asr
    upstreams: { primary: amphion_asr, secondary: qwen_asr }
    client_overridable: true
  - path: /tuling/ast/v3
    protocol: astv3
    task: asr
    upstreams: { primary: amphion_asr }     # 只声明 primary => primary-only
    lock: { enable_secondary_asr: false }   # 硬锁定: 客户端不可撤销
  - path: /emotion-segmented-streaming
    protocol: native
    task: emotion
    upstreams: { emotion: amphion_emotion }
